<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Graph — syllogism.info</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20x%3D%2250%22%20y%3D%2276%22%20font-size%3D%2278%22%20text-anchor%3D%22middle%22%20font-family%3D%22Georgia%2Cserif%22%3E%E2%88%B4%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="stylesheet" href="/style.css">
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; overflow: hidden; }
  .masthead { flex: none; width: 100%; max-width: none; }
  #stage { flex: 1; position: relative; min-height: 0; }
  #graph { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #graph.panning { cursor: grabbing; }

  .gedge {
    stroke: var(--line);
    stroke-width: 1.2;
    fill: none;
  }
  .gedge.hot { stroke: var(--accent); stroke-width: 1.8; }
  .gnode { cursor: pointer; }
  .gnode circle {
    fill: var(--card);
    stroke: var(--accent);
    stroke-width: 1.5;
  }
  .gnode.featured circle { fill: var(--accent); }
  .gnode.root circle { stroke-dasharray: 3 2.5; stroke: var(--muted); }
  .gnode text {
    font-family: Georgia, "Iowan Old Style", serif;
    font-size: 11px;
    fill: var(--muted);
    pointer-events: none;
  }
  .gnode.hot text { fill: var(--ink); }
  .dimmed { opacity: 0.16; }

  #panel {
    position: absolute; top: 1rem; right: 1rem; width: min(22rem, calc(100% - 2rem));
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 1rem 1.2rem; font-size: 0.95rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  #panel h3 { margin: 0 0 0.4rem; font-size: 1.05rem; font-weight: normal; line-height: 1.35; }
  #panel .meta { color: var(--muted); font-size: 0.8rem; margin: 0 0 0.5rem; }
  #panel .go { font-size: 0.9rem; }
  #legend {
    position: absolute; bottom: 1rem; left: 1rem; color: var(--muted);
    font-size: 0.78rem; line-height: 1.9; pointer-events: none;
  }
  #legend svg { vertical-align: -3px; margin-right: 0.35rem; }
</style>
</head>
<body>
<header class="masthead">
  <a class="wordmark" href="/"><span class="therefore-mark">∴</span> syllogism.info</a>
  <span class="tagline">the argument graph</span>
</header>
<div id="stage">
  <svg id="graph"></svg>
  <div id="panel">
    <h3>The argument graph</h3>
    <p class="meta">Every node is a claim; an arrow A → B means some argument infers B from A.
    Click a node to inspect it, drag to rearrange, scroll to zoom.</p>
  </div>
  <div id="legend">
    <div><svg width="14" height="14"><circle cx="7" cy="7" r="5.5" fill="var(--accent)"/></svg>featured claim</div>
    <div><svg width="14" height="14"><circle cx="7" cy="7" r="5.5" fill="var(--card)" stroke="var(--accent)" stroke-width="1.5"/></svg>claim with arguments</div>
    <div><svg width="14" height="14"><circle cx="7" cy="7" r="5.5" fill="var(--card)" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="3 2.5"/></svg>root claim (no arguments yet)</div>
  </div>
</div>
<script src="/graph/graph.js"></script>
</body>
</html>
